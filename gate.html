<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>In development — Robert Eyre</title>
<meta name="robots" content="noindex">
<meta name="theme-color" content="#14110D">
<link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAzMiAzMiI+PHJlY3Qgd2lkdGg9IjMyIiBoZWlnaHQ9IjMyIiByeD0iNiIgZmlsbD0iIzE0MTEwRCIvPjxwYXRoIGQ9Ik0xNiA1IEwyNyAxNiBMMTYgMjcgTDUgMTYgWiIgZmlsbD0iI0UwOEEyRiIvPjwvc3ZnPg==">
<script>
  try { if (localStorage.getItem('robert-site-unlocked') === 'yes') location.replace('index.html'); } catch (e) {}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"></noscript>
<style>
  html, body { margin: 0; padding: 0; background: #14110D; }
  * { box-sizing: border-box; }
  ::selection { background: #E08A2F; color: #14110D; }
  input::placeholder { color: rgba(242,237,228,0.3); }
  :focus-visible { outline: 2px solid #E08A2F; outline-offset: 3px; }
  @keyframes gateShake { 0%, 100% { transform: translateX(0); } 20% { transform: translateX(-8px); } 40% { transform: translateX(8px); } 60% { transform: translateX(-5px); } 80% { transform: translateX(5px); } }
  .page { color: #F2EDE4; font-family: 'Archivo', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }
  .bar { display: flex; justify-content: space-between; align-items: center; padding: 28px 48px; font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.14em; color: rgba(242,237,228,0.65); }
  .bar.top { border-bottom: 1px solid rgba(242,237,228,0.12); }
  .bar.bottom { border-top: 1px solid rgba(242,237,228,0.12); font-size: 12px; color: rgba(242,237,228,0.4); }
  .status { color: #E08A2F; }
  .center { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 64px 48px; }
  .kicker { font-family: 'IBM Plex Mono', monospace; font-size: 14px; letter-spacing: 0.22em; color: #E08A2F; margin-bottom: 28px; }
  .headline { font-weight: 900; font-stretch: 118%; font-size: clamp(64px, 10vw, 150px); line-height: 0.92; letter-spacing: -0.02em; text-transform: uppercase; }
  .form { margin-top: 56px; max-width: 460px; }
  .form.shake { animation: gateShake 0.4s ease; }
  .prompt { font-family: 'IBM Plex Mono', monospace; font-size: 12px; letter-spacing: 0.18em; color: rgba(242,237,228,0.5); margin-bottom: 14px; }
  .prompt.wrong { color: #E08A2F; }
  .row { display: flex; }
  .row input { flex: 1; min-width: 0; background: none; border: 1px solid rgba(242,237,228,0.3); border-right: none; color: #F2EDE4; font-family: 'IBM Plex Mono', monospace; font-size: 15px; letter-spacing: 0.2em; padding: 16px 20px; outline: none; }
  .row input:focus { border-color: #E08A2F; }
  .row button { flex: none; background: #E08A2F; border: 1px solid #E08A2F; color: #14110D; font-family: 'IBM Plex Mono', monospace; font-size: 13px; letter-spacing: 0.14em; padding: 16px 28px; cursor: pointer; font-weight: 500; }
  .row button:hover { background: #EDA050; }
  @media (max-width: 640px) {
    .bar.top { padding: 18px 22px; flex-wrap: wrap; gap: 6px 14px; }
    .center { padding: 48px 24px; }
    .bar.bottom { padding: 22px 24px; flex-direction: column; gap: 8px; align-items: flex-start; }
    .row button { padding: 16px 20px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="bar top">
    <div>51.4993° N, 0.1938° W — LONDON</div>
    <div class="status">STATUS — IN DEVELOPMENT</div>
  </div>

  <div class="center">
    <div class="kicker">ROBERT EYRE — WORK IN PROGRESS</div>
    <div class="headline">Not open<br>yet.</div>
    <div class="form" id="form">
      <div class="prompt" id="prompt">GOT THE PASSWORD? IN YOU COME.</div>
      <div class="row">
        <input type="password" id="pw" placeholder="PASSWORD" autocomplete="off" autofocus>
        <button id="enter">ENTER →</button>
      </div>
    </div>
  </div>

  <div class="bar bottom">
    <div>HARD HATS REQUIRED BEYOND THIS POINT</div>
    <div>© 2026</div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var PASSWORD = "development";
  var pw = document.getElementById("pw");
  var prompt = document.getElementById("prompt");
  var form = document.getElementById("form");

  function tryUnlock() {
    if (pw.value.trim().toLowerCase() === PASSWORD.toLowerCase()) {
      try { localStorage.setItem("robert-site-unlocked", "yes"); } catch (e) {}
      location.href = "index.html";
    } else {
      pw.value = "";
      prompt.textContent = "NOT THAT ONE — TRY AGAIN";
      prompt.classList.add("wrong");
      form.classList.remove("shake");
      // reflow to restart the animation
      void form.offsetWidth;
      form.classList.add("shake");
      pw.focus();
    }
  }

  document.getElementById("enter").addEventListener("click", tryUnlock);
  pw.addEventListener("keydown", function (ev) { if (ev.key === "Enter") tryUnlock(); });
  pw.addEventListener("input", function () { prompt.textContent = "GOT THE PASSWORD? IN YOU COME."; prompt.classList.remove("wrong"); });
  setTimeout(function () { try { pw.focus(); } catch (e) {} }, 60);
})();
</script>
</body>
</html>
